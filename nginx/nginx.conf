user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Definição do formato de log estruturado para compatibilidade com Loki
    log_format json_analytics escape=json
      '{"time_local":"$time_local",'
      '"remote_addr":"$remote_addr",'
      '"request":"$request",'
      '"status": "$status",'
      '"body_bytes_sent":"$body_bytes_sent",'
      '"request_time":"$request_time",'
      '"http_referrer":"$http_referer",'
      '"http_user_agent":"$http_user_agent",'
      '"http_host":"$http_host",'
      '"upstream_response_time":"$upstream_response_time"}';

    access_log /var/log/nginx/access.log json_analytics;

    sendfile        on;
    tcp_nopush     on;
    tcp_nodelay    on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # Otimização de segurança
    server_tokens off;

    # Rate Limiting: 100 requisições por minuto por IP único (100r/m = 1.6r/s)
    # 10m de zona de armazenamento armazena cerca de 160.000 IPs únicos
    limit_req_zone $binary_remote_addr zone=ip_limit:10m rate=100r/m;
    limit_req_status 429;

    # Upstream para a API Fastify
    upstream trackserver_api {
        server api:3000;
        keepalive 32;
    }

    # Redirecionamento automático HTTP -> HTTPS para todos os subdomínios
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        return 301 https://$host$request_uri;
    }

    # Servidor Principal HTTPS com suporte a wildcard (*.track.seusaas.com) e domínios CNAME
    server {
        listen 443 ssl default_server;
        listen [::]:443 ssl default_server;
        server_name _;

        # Certificados Wildcard (serão montados pelo docker-compose)
        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # Configurações SSL Premium (Modern Profile de acordo com Mozilla SSL Config Generator)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # Otimizações de cabeçalhos de segurança (HSTS)
        add_header Strict-Transport-Security "max-age=63072000" always;

        # Endpoint de Rastreamento
        location /api/v1/event {
            # Aplicar limite de requisições configurado
            # burst=20 permite picos repentinos sem travar a navegação inicial do site do cliente
            limit_req zone=ip_limit burst=20 nodelay;

            proxy_pass http://trackserver_api;
            proxy_http_version 1.1;
            
            # Passar os cabeçalhos de rede reais
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Otimização de buffers para alta vazão
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;

            # Timeout curto para evitar gargalos na entrega
            proxy_connect_timeout 5s;
            proxy_read_timeout 10s;
            proxy_send_timeout 10s;
        }

        # Endpoints Administrativos
        location /admin/ {
            # Sem burst alto para evitar brute force no cadastro
            limit_req zone=ip_limit burst=5 nodelay;

            proxy_pass http://trackserver_api;
            proxy_http_version 1.1;

            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Endpoint de Health Check
        location /health {
            proxy_pass http://trackserver_api;
            proxy_set_header Host $http_host;
        }

        # Página padrão em caso de 429
        error_page 429 /429.json;
        location = /429.json {
            default_type application/json;
            return 429 '{"error": "Too Many Requests", "message": "Rate limit exceeded. Please try again later."}';
        }
    }
}
